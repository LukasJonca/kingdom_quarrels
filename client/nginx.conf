server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy all /api/* requests to the Express server
    location /api/ {
        proxy_pass         http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy socket.io WebSocket connections to the Express server
    location /socket.io/ {
        proxy_pass         http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # Serve static files; fall back to index.html for hash-based client routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fonts and images aggressively
    location ~* \.(woff2?|ttf|eot|png|jpg|jpeg|svg|ico|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the HTML entry-point
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
